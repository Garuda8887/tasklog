<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Calendar grid lines (subtle) -->
  <rect x="116" y="148" width="280" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="116" y="200" width="280" height="4" rx="2" fill="rgba(255,255,255,0.10)"/>
  <rect x="116" y="252" width="140" height="4" rx="2" fill="rgba(255,255,255,0.10)"/>

  <!-- Bold checkmark — the main symbol -->
  <!-- Thick, confident stroke. Short leg from bottom-left, long diagonal up-right -->
  <path
    d="M 136 272 L 210 358 L 376 162"
    fill="none"
    stroke="white"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Small accent dot top-right -->
  <circle cx="388" cy="142" r="22" fill="rgba(255,255,255,0.35)"/>
</svg>
